<!DOCTYPE html>
<html lang="pt-br">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>LunecasBonecas</title>
    <link rel="shortcut icon" href="logo.png">
</head>

<body>
    <header>
        <!-- Ícone SVG de Coroa Minimalista -->
        <h1 style="display: flex; align-items: center; justify-content: center;">Lunecas
            <svg class="icon" width="48" height="48" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <polygon points="50,10 61,40 92,40 67,60 76,90 50,70 24,90 33,60 8,40 39,40">
            </svg>
            Bonecas
        </h1>
        <nav style="display: flex;gap: 15px; margin-top: 10px; flex-direction: column; justify-content: center;">
            <div>
                <a href="index.html">Home</a>
                <a class="active" href="peticao.html">Petição</a>
                <a href="decretos.html">Decretos</a>
                <a href="comentarios.html">Comentários</a>
                <a href="galeria.html">Fotos</a>
                <a href="sobre.html">Sobre</a>
            </div>
            <a href="https://www.instagram.com/cursedcashi/" target="_blank">
                <img src="https://static.cdninstagram.com/rsrc.php/yr/r/rzWiSjZRxk5.webp" alt="Instagram"
                    style="width: 15px; height: auto; margin-left: 10px;">
            </a>
        </nav>
    </header>

    <main class="container">
        <h1>Petição Oficial</h1>
        <p>Junte-se ao movimento. Até o momento, <strong id="num">5.420</strong> pessoas assinaram.</p>
        <form id="peticaoForm" onsubmit="processarAssinatura(event)">
            <input type="text" id="nome" placeholder="Nome Completo" required
                style="display:block; width:100%; margin-bottom:10px; padding:10px; border: 1px solid #ccc; border-radius: 25px;">
            <input type="email" id="email" placeholder="Seu E-mail" required
                style="display:block; width:100%; margin-bottom:20px; padding:10px; border: 1px solid #ccc; border-radius: 25px;">
            <button type="submit" id="btnAssinar">Confirmar Assinatura Oficial</button>
        </form>

        <div id="mensagemSucesso"
            style="display:none; margin-top:20px; padding:15px; background:var(--rosa-mais-destaque); color:white; border-radius:10px;">
            Assinatura registrada com sucesso. Bem-vindo ao corpo de apoiadores de LunecasBonecas.
        </div>
    </main>

    <script>
        window.onload = function () {
            const numSalvo = localStorage.getItem('numAssinaturas');
            if (numSalvo) {
                document.getElementById('num').textContent = parseInt(numSalvo).toLocaleString('pt-BR');
            }
        };

        function processarAssinatura(event) {
            event.preventDefault();

            // Simulação de "fazer algo" (registro no banco de dados)
            const nome = document.getElementById('nome').value;
            console.log("Registrando cidadão no sistema oficial: " + nome);

            // Feedback visual sério
            document.getElementById('peticaoForm').style.display = 'none';
            document.getElementById('mensagemSucesso').style.display = 'block';

            // Atualizar o contador de assinaturas
            const numElement = document.getElementById('num');
            let numAtual = parseInt(numElement.textContent.replace(/\./g, '')) + 1;

            localStorage.setItem('numAssinaturas', numAtual);
            numElement.textContent = numAtual.toLocaleString('pt-BR');
        }
    </script>

    <footer style="text-align: center">
        <p>&copy; 2026 LunecasBonecas. Todos os direitos reservados.</p>
    </footer>
</body>

</html>
